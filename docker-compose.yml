services:
  postgres:
    image: postgres:17-alpine
    container_name: hm_postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: home_monitor
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d home_monitor"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - app_bridge

  redis:
    image: redis:alpine
    container_name: hm_redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - app_bridge

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hm_backend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DATABASE_URL: postgresql+psycopg://postgres:123456@postgres:5432/home_monitor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecretkey_please_change_in_production
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-zh-CN}
      VIDEO_ROOT_PATH: /data/videos
      PLAYBACK_CACHE_ROOT: /data/hls
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-123456}
      DB_INIT_MAX_RETRIES: ${DB_INIT_MAX_RETRIES:-180}
      DB_INIT_RETRY_INTERVAL_SECONDS: ${DB_INIT_RETRY_INTERVAL_SECONDS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./xiaomi_video:/data/videos
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - app_bridge

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hm_celery_worker
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DATABASE_URL: postgresql+psycopg://postgres:123456@postgres:5432/home_monitor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecretkey_please_change_in_production
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-zh-CN}
      VIDEO_ROOT_PATH: /data/videos
      PLAYBACK_CACHE_ROOT: /data/hls
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-123456}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./xiaomi_video:/data/videos
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A src.core.celery_app worker --loglevel=info -Q celery,analysis_hot,analysis_full
    networks:
      - app_bridge

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hm_celery_beat
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DATABASE_URL: postgresql+psycopg://postgres:123456@postgres:5432/home_monitor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecretkey_please_change_in_production
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-zh-CN}
      VIDEO_ROOT_PATH: /data/videos
      PLAYBACK_CACHE_ROOT: /data/hls
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-123456}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./xiaomi_video:/data/videos
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A src.core.celery_app beat --loglevel=info
    networks:
      - app_bridge

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hm_frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8226:80"
    networks:
      - app_bridge

volumes:
  postgres_data:
  redis_data:

networks:
  app_bridge:
    driver: bridge
