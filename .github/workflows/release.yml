name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/q8247990/video_dariy/backend
  FRONTEND_IMAGE: ghcr.io/q8247990/video_dariy/frontend

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build Images & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare release compose file
        run: |
          sed "s|\${IMAGE_TAG:-latest}|${{ steps.version.outputs.VERSION }}|g" \
            docker-compose.release.yml > docker-compose-${{ steps.version.outputs.VERSION }}.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body: |
            ## 部署方式

            1. 下载 `docker-compose-${{ steps.version.outputs.VERSION }}.yml`
            2. 创建 `.env` 文件配置环境变量：
               ```bash
               # 必须修改
               SECRET_KEY=your_secret_key
               DEFAULT_ADMIN_PASSWORD=your_admin_password

               # 视频目录（宿主机路径）
               VIDEO_HOST_PATH=/path/to/your/videos

               # 可选
               POSTGRES_PASSWORD=123456
               FRONTEND_PORT=8226
               BACKEND_PORT=8000
               ```
            3. 启动服务：
               ```bash
               docker compose -f docker-compose-${{ steps.version.outputs.VERSION }}.yml pull
               docker compose -f docker-compose-${{ steps.version.outputs.VERSION }}.yml up -d
               ```
            4. 访问 `http://localhost:8226` 进入管理页面

            ## Docker 镜像

            - Backend: `${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}`
            - Frontend: `${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}`
          files: |
            docker-compose-${{ steps.version.outputs.VERSION }}.yml
          draft: false
          prerelease: false
